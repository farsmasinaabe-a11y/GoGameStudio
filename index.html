<!DOCTYPE html><html lang="ru">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache">
<title>Игры v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#eee;font-family:system-ui;text-align:center;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:8px;user-select:none}
#game{display:none;flex-direction:column;align-items:center}
#boardBox{display:inline-block}
#btns{display:flex;gap:6px;margin:6px 0;flex-wrap:wrap;justify-content:center}
button{background:#2a2a4a;color:#ddd;border:1px solid #444;padding:8px 14px;border-radius:8px;font-size:14px;cursor:pointer;min-width:48px;transition:background .15s}
button:active{background:#444}
.btn-big{padding:12px 32px;font-size:18px;margin-top:12px}
.btn-red{background:#5a2020;border-color:#733}
.btn-green{background:#2a5a2a;border-color:#3a3}
.btn-wide{display:block;width:100%;box-sizing:border-box;margin-bottom:16px}
.btn-back{background:#2a2a4a;border-color:#444;font-size:13px;padding:6px 12px;margin-bottom:8px}
.btn-sm{padding:6px 10px;font-size:12px;min-width:36px;border-radius:6px}
.btn-active{background:#4a4a6a;border-color:#888}
.menu-screen{width:100%;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:8px;text-align:center;position:relative}
.menu-screen h1{font-size:36px;margin-bottom:4px}
.menu-screen .sub{color:#999;font-size:13px;margin-bottom:20px}
.menu-screen label{display:block;font-size:13px;color:#aaa;margin:8px 0 4px}
.menu-screen select{background:#2a2a4a;color:#ddd;border:1px solid #444;padding:8px 12px;border-radius:8px;font-size:15px;margin-bottom:8px;outline:none}
.game-card{background:#1e1e3a;border:1px solid #333;border-radius:12px;padding:32px;width:90vw;max-width:320px;cursor:pointer;transition:background .15s}
.game-card:hover,.game-card:active{background:#2a2a4e}
.game-card h2{font-size:24px;margin-bottom:4px}
.game-card p{font-size:12px;color:#888}
#practiceBar{display:none;gap:8px;justify-content:center;align-items:center;margin:4px 0}
#info{font-size:12px;color:#aaa;margin:2px 0;min-height:18px}
#moveLog{display:none;margin:8px 0;align-self:stretch;max-height:80px;overflow-y:auto;text-align:left;font-size:11px;color:#aaa;background:#12122a;border:1px solid #333;border-radius:8px;padding:6px 10px;font-family:monospace;line-height:1.4}
</style></head>
<body>
<script async src="https://telegram.org/js/telegram-web-app.js"></script>

<div id="menu-main" class="menu-screen">
 <div class="game-card" onclick="openGoSettings()">
  <h2>&#x1F004;&#xFE0F; Го</h2>
 </div>
</div>

<div id="menu-go" class="menu-screen" style="display:none">
 <div style="display:flex;gap:10px;margin-bottom:12px">
  <button class="btn-wide" onclick="showScreen('menu-main')" style="margin-bottom:0">Главное меню</button>
  <button class="btn-wide" onclick="startLearn()" style="margin-bottom:0">&#x1F4DC; Правила</button>
 </div>

 <div style="display:flex;gap:10px;margin-bottom:12px">
  <div style="flex:1;min-width:0;background:#1e1e3a;border:1px solid #333;border-radius:10px;padding:12px;text-align:left">
   <div style="font-size:14px;color:#aaa;margin-bottom:10px">&#x26AB; Доска</div>
   <label>Размер</label>
   <select id="sizeSel">
    <option value="9" selected>9&#xD7;9</option>
    <option value="13">13&#xD7;13</option>
    <option value="19">19&#xD7;19</option>
   </select>
   <label>Стиль</label>
   <select id="boardStyle">
    <option value="wood" selected>Дуб</option>
    <option value="bamboo">Бамбук</option>
   </select>
   <label>Подписи</label>
   <select id="coordStyle">
    <option value="1" selected>Да</option>
    <option value="0">Нет</option>
   </select>
   <label>Камни</label>
   <select id="stoneStyle">
    <option value="glass" selected>Глянцевые</option>
    <option value="matte">Матовые</option>
   </select>
  </div>

  <div style="flex:1;min-width:0;background:#1e1e3a;border:1px solid #333;border-radius:10px;padding:12px;text-align:left">
   <div style="font-size:14px;color:#aaa;margin-bottom:10px">&#x1F3AE; Игра</div>
   <label>Режим</label>
   <select id="modeSel" onchange="switchGoMode(this.value)" style="margin-bottom:8px">
    <option value="ai" selected>ИИ</option>
    <option value="twoplayer">Вдвоём</option>
    <option value="practice">Практика</option>

   </select>
   <div id="aiSettings">
    <label>Сложность</label>
    <select id="levelSel">
     <option value="1">Новичок</option>
     <option value="2" selected>Опытный</option>
     <option value="3">Эксперт</option>
    </select>
    <label>Цвет</label>
    <select id="colorSel">
     <option value="1" selected>Чёрные</option>
     <option value="-1">Белые</option>
    </select>
    <label>Подсчёт</label>
    <select id="rulesSel">
     <option value="japanese" selected>Японский</option>
     <option value="chinese">Китайский</option>
     <option value="free">Свободный</option>
    </select>
   </div>
  </div>
 </div>

 <button class="btn-big btn-green" onclick="startGame()">Старт</button>
</div>

<div id="game">
 <div id="info"></div>
 <div id="practiceBar">
  <span style="font-size:13px;color:#aaa">Цвет:</span>
  <button id="pbBlack" class="btn-sm btn-active" onclick="setPracticeColor(1)">&#x26AB;</button>
  <button id="pbWhite" class="btn-sm" onclick="setPracticeColor(-1)">&#x26AA;</button>
  <button class="btn-sm" onclick="act('clear')" style="background:#5a3030">&#x1F5D1;</button>
 </div>
 <div id="boardBox"></div>
 <div id="btns">
  <button id="btnPass" onclick="logMove('Вы','pass','');act('pass')">&#x23ED; Пас</button>
  <button id="btnUndo" onclick="act('undo')">&#x21A9; Отмена</button>
  <button class="btn-red" onclick="act('end')">&#x1F3C1; Конец</button>
 </div>
 <div id="moveLog"></div>
 <div id="result" style="display:none;margin:16px">
  <h2 id="resultTitle" style="font-size:22px;margin-bottom:8px"></h2>
  <div id="resultScore" style="font-size:16px;color:#aaa;margin-bottom:16px"></div>
  <button class="btn-big btn-green" onclick="act('closeGame')">ОК</button>
 </div>
</div>

<div id="screen-learn" style="display:none;width:100%;height:100vh;padding:0;text-align:left">
 <button class="btn-back" onclick="showScreen('menu-go')" style="position:absolute;top:8px;left:8px;z-index:10">Вернуться</button>
 <div id="learnContent" style="width:100%;height:100%"></div>
</div>

<script>
var tg=window.Telegram?Telegram.WebApp:null;
if(tg){try{tg.ready()}catch(e){}try{tg.expand()}catch(e){}try{tg.MainButton.hide()}catch(e){}}
window.onerror=function(m,s,l,c,e){alert('JS Error: '+m+' line '+l);return false;};

var B=1,W=-1,E=0;
var game=null,board=null,size=9,aiLevel=2,mode='ai',practiceColor=B;
var hist=[],passed=false,undoUsed=false,gameActive=false;
var stoneObjects=[],aiTimer=0,playerColor=B,komi=6.5,origB=null,origW=null;
var wgoLoaded=false,wgoLoading=false,wgoCallbacks=[];

var COLS='ABCDEFGHJKLMNOPQRST';

function coordStr(x,y){
 return COLS[x]+(size-y);
}

function logMove(who,x,y){
 var log=document.getElementById('moveLog');
 var e=document.createElement('div');
 e.style.whiteSpace='nowrap';
 var n=log.children.length+1;
 e.textContent=n+'. '+who+': '+(x==='pass'?'Пас':coordStr(x,y));
 log.appendChild(e);
 log.scrollTop=log.scrollHeight;
}

function popLog(n){
 var log=document.getElementById('moveLog');
 for(var i=0;i<n&&log.lastChild;i++)log.removeChild(log.lastChild);
}

function loadWGo(cb){
 if(wgoLoaded){cb();return}
 wgoCallbacks.push(cb);
 if(wgoLoading)return;
 wgoLoading=true;
 var s=document.createElement('script');
 s.src='wgo.custom.js';
 s.onload=function(){wgoLoaded=true;wgoLoading=false;wgoCallbacks.forEach(function(f){f()});wgoCallbacks=[]};
  document.head.appendChild(s);
}

var audioCtx=null;
function playStoneSound(){
 if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
 if(audioCtx.state==='suspended')audioCtx.resume();
 var t=audioCtx.currentTime,dur=0.08;
 var gain=audioCtx.createGain();
 gain.gain.setValueAtTime(0.25,t);
 gain.gain.exponentialRampToValueAtTime(0.001,t+dur);
 var buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur|0,audioCtx.sampleRate);
 var data=buf.getChannelData(0);
 for(var i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,3);
 var src=audioCtx.createBufferSource();
 src.buffer=buf;
 src.playbackRate.value=0.35+Math.random()*0.1;
 var filt=audioCtx.createBiquadFilter();
 filt.type='lowpass';
 filt.frequency.value=700+Math.random()*500;
 src.connect(filt);
 filt.connect(gain);
 gain.connect(audioCtx.destination);
 src.start(t);
 src.stop(t+dur);
 try{navigator.vibrate(10)}catch(e){}
}

function showScreen(id){
 document.getElementById('menu-main').style.display='none';
 document.getElementById('menu-go').style.display='none';
 document.getElementById('game').style.display='none';
 document.getElementById('screen-learn').style.display='none';
 document.getElementById(id).style.display=(id==='game'?'flex':'flex');
}

function openGoSettings(){showScreen('menu-go')}

function switchGoMode(m){
 mode=m;
 var ai=document.getElementById('aiSettings');
 if(m==='ai'){
  ai.style.opacity='';
  ai.style.pointerEvents='';
 }else{
  ai.style.opacity='0.35';
  ai.style.pointerEvents='none';
  if(m==='practice')document.getElementById('rulesSel').value='free';
 }
}

function setPracticeColor(c){
 practiceColor=c;
 document.getElementById('pbBlack').classList.toggle('btn-active',c===B);
 document.getElementById('pbWhite').classList.toggle('btn-active',c===W);
}

function initGame(sz,level,rules){
 size=sz;aiLevel=level;
 game=new WGo.Game(size,rules||WGo.JAPANESE_RULES);
 practiceColor=B;
 document.getElementById('pbBlack').classList.add('btn-active');
 document.getElementById('pbWhite').classList.remove('btn-active');
 hist=[];passed=false;undoUsed=false;stoneObjects=[];
}

function refreshBoard(){
 if(!board)return;
 board.redraw();
 var pos=game.position;
 var newStones=[];
 for(var x=0;x<size;x++)for(var y=0;y<size;y++){
  var c=pos.get(x,y);
  if(c===E)continue;
  var ex=stoneObjects.find(function(o){return o.x===x&&o.y===y&&o.color===c;});
  if(ex){newStones.push(ex);continue}
  var obj=new WGo.FieldBoardObject(c===B?'B':'W',x,y);
  board.addObject(obj);
  obj.color=c;
  newStones.push(obj);
 }
 for(var i=0;i<stoneObjects.length;i++){
  if(newStones.indexOf(stoneObjects[i])<0)board.removeObject(stoneObjects[i]);
 }
 stoneObjects=newStones;
}

function startLearn(){showLearnList();}

function startGame(){
 if(mode==='learn')return;
 loadWGo(function(){
 var sz=parseInt(document.getElementById('sizeSel').value);
 var lv=parseInt(document.getElementById('levelSel').value);
 var bs=document.getElementById('boardStyle').value;
 var ss=document.getElementById('stoneStyle').value;
 var co=document.getElementById('coordStyle').value==='1';
 playerColor=parseInt(document.getElementById('colorSel').value);
 var rulesMap={japanese:WGo.JAPANESE_RULES,chinese:WGo.CHINESE_RULES,free:WGo.NO_RULES};
 var curRules=rulesMap[document.getElementById('rulesSel').value]||WGo.JAPANESE_RULES;
 komi=curRules.komi;
 initGame(sz,lv,curRules);

 // remove old stones
 if(board){
  while(stoneObjects.length)board.removeObject(stoneObjects.pop());
  if(board.objects)board.objects.length=0;
 }
 stoneObjects=[];
 initGame(sz,lv);

 var box=document.getElementById('boardBox');
 var maxW=Math.min(window.innerWidth*0.92,window.innerHeight*0.6,600);

 var styles={
  wood:{bg:'#B89543',line:'#5C3A1E',star:'#3A2210',coord:'#3A2210'},
  bamboo:{bg:'#D4C878',line:'#8B7D4A',star:'#5C4A20',coord:'#5C4A20'}
 }[bs]||{bg:'#CEB053',line:'#654525',star:'#531',coord:'#531'};

  var theme={
   backgroundColor:styles.bg,
   grid:{linesColor:styles.line,starColor:styles.star},
   coordinates:{color:styles.coord,top:co,left:co,right:false,bottom:false}
  };
  if(ss==='matte'){
   theme.drawHandlers={B:new WGo.MatteStoneBlack(),W:new WGo.MatteStoneWhite()};
  }

  if(!board){
   box.innerHTML='';
   board=new WGo.SVGBoard(box,{size:size,width:maxW,theme:theme,coordinates:co});
   // save original glass handlers
   if(!origB)origB=board.config.theme.drawHandlers.B;
   if(!origW)origW=board.config.theme.drawHandlers.W;
   setupBoardClick();
  }else{
   board.setSize(size);
   var t=board.config.theme;
   t.backgroundColor=styles.bg;
   if(t.grid){t.grid.linesColor=styles.line;t.grid.starColor=styles.star;}
   if(t.coordinates){
    t.coordinates.color=styles.coord;
    t.coordinates.top=co;t.coordinates.left=co;
    t.coordinates.right=false;t.coordinates.bottom=false;
   }
   if(ss==='matte'){
    t.drawHandlers.B=new WGo.MatteStoneBlack();
    t.drawHandlers.W=new WGo.MatteStoneWhite();
   }else{
    if(origB)t.drawHandlers.B=origB;
    if(origW)t.drawHandlers.W=origW;
   }
   board.redraw();
  }
  box.style.display='';

 showScreen('game');
 document.getElementById('moveLog').style.display='block';
 document.getElementById('moveLog').innerHTML='';
 gameActive=true;
 clearTimeout(aiTimer);
 if(mode==='ai'&&game.turn!==playerColor)aiTimer=setTimeout(aiMove,300);
 document.getElementById('result').style.display='none';
 document.getElementById('btns').style.display='';
 document.getElementById('info').style.display='';
 document.getElementById('practiceBar').style.display=(mode==='practice'?'flex':'none');
 document.getElementById('btnPass').style.display=(mode==='practice'?'none':'inline');
 document.getElementById('btnUndo').style.display=(mode==='practice'?'none':'inline');
 updateInfo();
 });
}

function countStones(pos,color){
 var cnt=0;
 for(var i=0;i<pos.grid.length;i++)if(pos.grid[i]===color)cnt++;
 return cnt;
}

function posBonus(x,y){
 var cx=(size-1)/2,cy=(size-1)/2;
 var dist=Math.abs(x-cx)+Math.abs(y-cy);
 var bonus=Math.max(0,8-dist)*0.5;
 if(x===0||x===size-1||y===0||y===size-1)bonus-=2;
 return bonus;
}

var AI={1:{rand:0.7,capW:5,atariW:-10,terrW:0,posW:0,look:false},
       2:{rand:0,capW:13,atariW:-50,terrW:0.45,posW:1,look:false},
       3:{rand:0,capW:17,atariW:-60,terrW:1.0,posW:2,look:true}};

function terrScore(pos,color){
 var opp=-color,sc=0;
 for(var x=0;x<size;x++)for(var y=0;y<size;y++){
  if(pos.get(x,y)!==E)continue;
  var f=0,e=0;
  if(x>0){var v=pos.get(x-1,y);if(v===color)f++;else if(v===opp)e++}
  if(x<size-1){v=pos.get(x+1,y);if(v===color)f++;else if(v===opp)e++}
  if(y>0){v=pos.get(x,y-1);if(v===color)f++;else if(v===opp)e++}
  if(y<size-1){v=pos.get(x,y+1);if(v===color)f++;else if(v===opp)e++}
  if(f>e)sc+=(f-e)*2;else if(e>f)sc-=(e-f)*2;
 }
 return sc;
}

function aiEval(x,y,pos,color,lv,fast){
 var p=AI[lv]||AI[2],opp=-color,sc=0;
 var cb=countStones(game.position,B),nb=countStones(pos,B);
 sc+=(color===B?nb-cb:cb-nb)*p.capW;
 sc+=countAtari(pos,color)*p.atariW;
 sc+=countAtari(pos,opp)*Math.abs(p.atariW)*0.6;
 if(p.posW>0)sc+=posBonus(x,y)*p.posW;
 if(!fast&&p.terrW>0){sc+=terrScore(pos,color)*p.terrW;sc-=terrScore(pos,opp)*p.terrW*0.5;}
 return sc;
}

function isSelfAtari(x,y,pos,color){
 var visited={},libSet={},stack=[[x,y]];
 while(stack.length){
  var p=stack.pop(),key=p[0]+','+p[1];
  if(visited[key])continue;
  visited[key]=true;
  for(var d=0;d<4;d++){
   var nx=p[0]+(d===0?-1:d===1?1:0);
   var ny=p[1]+(d===2?-1:d===3?1:0);
   if(nx<0||nx>=pos.size||ny<0||ny>=pos.size)continue;
   var v=pos.get(nx,ny);
   if(v===E)libSet[nx+','+ny]=true;
   else if(v===color&&!visited[nx+','+ny])stack.push([nx,ny]);
  }
 }
 return Object.keys(libSet).length===1;
}

function countAtari(pos,color){
 var vis={},cnt=0;
 for(var i=0;i<pos.grid.length;i++){
  if(pos.grid[i]!==color)continue;
  var x=Math.floor(i/pos.size),y=i%pos.size;
  var k=x+','+y;if(vis[k])continue;
  // flood-fill group and count liberties
  var stk=[[x,y]],cells=[],libSet={},grpVis={};
  while(stk.length){
   var p=stk.pop(),kr=p[0]+','+p[1];
   if(grpVis[kr])continue;grpVis[kr]=true;cells.push(kr);
   var nb=[[p[0]-1,p[1]],[p[0]+1,p[1]],[p[0],p[1]-1],[p[0],p[1]+1]];
   for(var j=0;j<nb.length;j++){
    var nx=nb[j][0],ny=nb[j][1];
    if(nx<0||nx>=pos.size||ny<0||ny>=pos.size)continue;
    var v=pos.get(nx,ny);
    if(v===E)libSet[nx+','+ny]=true;
    else if(v===color&&!grpVis[nx+','+ny])stk.push([nx,ny]);
   }
  }
  for(var j=0;j<cells.length;j++)vis[cells[j]]=true;
  if(Object.keys(libSet).length===1)cnt++;
 }
 return cnt;
}

function aiMove(){
 if(!gameActive||mode!=='ai'||game.turn!==-playerColor)return;
 var aiC=-playerColor,lv=aiLevel,p=AI[lv]||AI[2];
 document.getElementById('info').textContent+='  |  \u0418\u0418 \u0434\u0443\u043c\u0430\u0435\u0442...';
 var all=[];
 for(var x=0;x<size;x++)for(var y=0;y<size;y++){
  if(game.position.get(x,y)!==E)continue;
  var res=game.tryToPlay(x,y);if(!res)continue;
  if(lv>=2){
   var capBefore=countStones(game.position,-aiC);
   var capAfter=countStones(res,-aiC);
   if(capAfter===capBefore&&isSelfAtari(x,y,res,aiC))continue;
  }
  if(lv===1&&Math.random()<p.rand){all.push({x:x,y:y,s:Math.random()*35-5});continue}
  var sc=aiEval(x,y,res,aiC,lv);
  if(p.look){
    var oppBest=-Infinity;
    var aiBefore=countStones(res,aiC);
    game.pushPosition(res);
    for(var ox=0;ox<size;ox++)for(var oy=0;oy<size;oy++){
     if(game.position.get(ox,oy)!==E)continue;
     var oppRes=game.tryToPlay(ox,oy);if(!oppRes)continue;
     var aiLost=aiBefore-countStones(oppRes,aiC);
     var atariDiff=countAtari(oppRes,aiC)-countAtari(res,aiC);
     var oppThreat=aiLost*15+atariDiff*40;
     if(oppThreat>oppBest)oppBest=oppThreat;
    }
    game.popPosition();
    sc-=oppBest;
   }
  if(lv===1||sc>=-10)all.push({x:x,y:y,s:sc});
 }
 if(!all.length){
  for(var x=0;x<size;x++)for(var y=0;y<size;y++){
   if(game.position.get(x,y)!==E)continue;
   var res=game.tryToPlay(x,y);if(!res)continue;
   if(lv>=2){
    var capBefore=countStones(game.position,-aiC);
    var capAfter=countStones(res,-aiC);
    if(capAfter===capBefore&&isSelfAtari(x,y,res,aiC))continue;
   }
   var sc=aiEval(x,y,res,aiC,lv);
   if(p.look){
    var oppBest=-Infinity;
    var aiBefore=countStones(res,aiC);
    game.pushPosition(res);
    for(var ox=0;ox<size;ox++)for(var oy=0;oy<size;oy++){
     if(game.position.get(ox,oy)!==E)continue;
     var oppRes=game.tryToPlay(ox,oy);if(!oppRes)continue;
     var aiLost=aiBefore-countStones(oppRes,aiC);
     var atariDiff=countAtari(oppRes,aiC)-countAtari(res,aiC);
     var oppThreat=aiLost*15+atariDiff*40;
     if(oppThreat>oppBest)oppBest=oppThreat;
    }
    game.popPosition();
    sc-=oppBest;
   }
   all.push({x:x,y:y,s:sc});
  }
 }
 if(!all.length){logMove('ИИ','pass','');act('pass');return}
 all.sort(function(a,b){return b.s-a.s});
 var best=[];
 if(lv===1){
  var topN=Math.max(1,Math.ceil(all.length*0.3));
  for(var i=0;i<topN;i++)best.push(all[i]);
 }else{
  for(var i=0;i<all.length;i++){if(all[i].s===all[0].s)best.push(all[i]);else break}
 }
 var m=best[Math.floor(Math.random()*best.length)];
 game.play(m.x,m.y);hist.push({x:m.x,y:m.y,color:aiC});
 playStoneSound();
 logMove('ИИ',m.x,m.y);
 passed=false;undoUsed=false;
 refreshBoard();updateInfo();
}

function flod(r,c){
 var cells=[],stk=[[r,c]],borders={};
 while(stk.length){
  var p=stk.pop(),kr=p[0]+','+p[1];
  if(cells.indexOf(kr)>=0)continue;cells.push(kr);
  var nb=[[p[0]-1,p[1]],[p[0]+1,p[1]],[p[0],p[1]-1],[p[0],p[1]+1]];
  for(var i=0;i<nb.length;i++){
   var nr=nb[i][0],nc=nb[i][1];
   if(nr<0||nr>=size||nc<0||nc>=size)continue;
   var v=game.position.get(nr,nc);
   if(v===E&&cells.indexOf(nr+','+nc)<0)stk.push([nr,nc]);
   else if(v)borders[v]=true;
  }
 }
 return{cells:cells,borders:Object.keys(borders).length===1?parseInt(Object.keys(borders)[0]):null};
}

function calcScore(){
 var pos=game.position,s={};s[B]=0;s[W]=0;
 var vis={};
 for(var x=0;x<size;x++)for(var y=0;y<size;y++){
  var v=pos.get(x,y),k=x+','+y;
  if(v!==E)s[v]++;
  else if(!vis[k]){
   var reg=flod(x,y);vis[k]=true;
   for(var i=0;i<reg.cells.length;i++)vis[reg.cells[i]]=true;
   if(reg.borders===B)s[B]+=reg.cells.length;
   else if(reg.borders===W)s[W]+=reg.cells.length;
  }
 }
 return s;
}

function updateInfo(){
 var sc=calcScore();
 var cap=game.position.capCount;
 var bscore=sc[B];
 var wscore=sc[W]+komi;
 var turn=mode==='twoplayer'?' \u2014 '+(game.turn===B?'\u26AB':'\u26AA'):'';
 document.getElementById('info').textContent='\u26AB \u00D7'+cap.black+'  \u26AA \u00D7'+cap.white+'  |  \u26AB '+bscore.toFixed(1)+' : '+wscore.toFixed(1)+' \u26AA (коми '+komi+') \u0425\u043e\u0434 '+(hist.length+1)+turn;
}

function act(a){
  if(a==='pass'){
   if(passed&&!undoUsed){endGame();return}
   game.pass();passed=true;undoUsed=false;
   hist.push(null);
  }else if(a==='undo'){
   if(!hist.length)return;
   var last=hist.pop();game.popPosition();
   if(mode==='ai'&&last&&last.color===-playerColor&&hist.length){
    hist.pop();game.popPosition();
   }
   popLog(mode==='ai'?2:1);
   passed=false;undoUsed=true;
   refreshBoard();
  }else if(a==='clear'){
   if(board){while(stoneObjects.length)board.removeObject(stoneObjects.pop());}
   stoneObjects=[];
   initGame(size,aiLevel);
   document.getElementById('moveLog').innerHTML='';
   refreshBoard();updateInfo();
  }else if(a==='end'){endGame();return}
   else if(a==='closeGame'){
    var s=calcScore(),w=s[B]>s[W]+komi?'\u26AB \u0427\u0451\u0440\u043d\u044b\u0435':'\u26AA \u0411\u0435\u043b\u044b\u0435';
    if(tg)tg.sendData(JSON.stringify({score:{black:s[B],white:s[W]},winner:w,size:size,moves:hist.filter(Boolean).length}));
    while(stoneObjects.length)board.removeObject(stoneObjects.pop());
    if(board.objects)board.objects.length=0;
    stoneObjects=[];game=null;
    document.getElementById('boardBox').style.display='none';
    document.getElementById('result').style.display='none';
    document.getElementById('btns').style.display='';
    document.getElementById('info').style.display='';
    document.getElementById('moveLog').style.display='none';
    showScreen('menu-go');
    return;
   }
 updateInfo();
 if(mode==='ai'&&gameActive)aiTimer=setTimeout(aiMove,200);
}

 function endGame(){
 gameActive=false;clearTimeout(aiTimer);
 document.getElementById('moveLog').style.display='none';
 var s=calcScore(),w=s[B]>s[W]+komi?'\u26AB \u0427\u0451\u0440\u043d\u044b\u0435':'\u26AA \u0411\u0435\u043b\u044b\u0435';
 document.getElementById('boardBox').style.display='none';
 document.getElementById('btns').style.display='none';
 document.getElementById('info').style.display='none';
 document.getElementById('practiceBar').style.display='none';
 document.getElementById('resultTitle').textContent=w+' \u043f\u043e\u0431\u0435\u0434\u0438\u043b\u0438!';
 document.getElementById('resultScore').textContent='\u26AB '+s[B].toFixed(1)+' : '+(s[W]+komi).toFixed(1)+' \u26AA (\u043a\u043e\u043c\u0438 '+komi+')';
 document.getElementById('result').style.display='block';
}

// WGo board click is attached on first startGame, listen via mutation
var _boardClickDone=false;
function setupBoardClick(){
 if(_boardClickDone||!board)return;
 _boardClickDone=true;
 board.on('click',function(evt,point){
  if(!point)return;
  if(mode==='practice'){
   var cur=game.position.get(point.x,point.y);
   var placing=cur===E;
   game.setStone(point.x,point.y,placing?practiceColor:E);
    if(placing){playStoneSound();logMove(practiceColor===B?'⚫':'⚪',point.x,point.y);}
    refreshBoard();updateInfo();
   return;
 }
 if(!gameActive||(mode==='ai'&&game.turn!==playerColor))return;
   if(!game.play(point.x,point.y))return;
    playStoneSound();
    logMove('Вы',point.x,point.y);
    hist.push({x:point.x,y:point.y,color:playerColor});
  passed=false;undoUsed=false;
  refreshBoard();updateInfo();
  if(mode==='ai')aiTimer=setTimeout(aiMove,200);
 });
}
