<!DOCTYPE html><html lang="ru">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Игры v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#eee;font-family:system-ui;text-align:center;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:8px;user-select:none}
#game{display:none;flex-direction:column;align-items:center}
#boardBox{display:inline-block}
#btns{display:flex;gap:6px;margin:6px 0;flex-wrap:wrap;justify-content:center}
button{background:#2a2a4a;color:#ddd;border:1px solid #444;padding:8px 14px;border-radius:8px;font-size:14px;cursor:pointer;min-width:48px;transition:background .15s}
button:active{background:#444}
.btn-big{padding:12px 32px;font-size:18px;margin-top:12px}
.btn-red{background:#5a2020;border-color:#733}
.btn-green{background:#2a5a2a;border-color:#3a3}
.btn-back{background:#333;border-color:#555;font-size:13px;padding:6px 12px;margin-bottom:8px}
.btn-sm{padding:6px 10px;font-size:12px;min-width:36px;border-radius:6px}
.btn-active{background:#4a4a6a;border-color:#888}
.menu-screen{margin-top:10vh;text-align:center;position:relative}
.menu-screen h1{font-size:36px;margin-bottom:4px}
.menu-screen .sub{color:#999;font-size:13px;margin-bottom:20px}
.menu-screen label{display:block;font-size:13px;color:#aaa;margin:8px 0 4px}
.menu-screen select{background:#2a2a4a;color:#ddd;border:1px solid #444;padding:8px 12px;border-radius:8px;font-size:15px;margin-bottom:8px;outline:none}
.game-card{background:#1e1e3a;border:1px solid #333;border-radius:12px;padding:16px;width:220px;margin:0 auto;cursor:pointer;transition:background .15s}
.game-card:hover,.game-card:active{background:#2a2a4e}
.game-card h2{font-size:20px;margin-bottom:4px}
.game-card p{font-size:12px;color:#888}
.tabs{display:inline-flex;gap:0;margin-bottom:16px;border-radius:8px;overflow:hidden;border:1px solid #444}
.tabs button{background:#1e1e3a;border:none;border-radius:0;padding:8px 16px;font-size:13px;min-width:0}
.tabs button.active{background:#2a2a4a;color:#fff}
#practiceBar{display:none;gap:8px;justify-content:center;align-items:center;margin:4px 0}
#info{font-size:12px;color:#aaa;margin:2px 0;min-height:18px}
</style></head>
<body>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/wgo"></script>

<div id="menu-main" class="menu-screen">
 <div class="game-card" onclick="openGoSettings()">
  <h2>&#x1F004;&#xFE0F; Го</h2>
 </div>
</div>

<div id="menu-go" class="menu-screen" style="display:none">
 <button class="btn-back" onclick="showScreen('menu-main')">&#x2190; Назад</button>
 <h1>&#x1F004;&#xFE0F; Го</h1>
 <div class="sub">Настройки игры</div>
 <label>Размер доски</label>
 <select id="sizeSel">
  <option value="9" selected>9&#xD7;9</option>
  <option value="13">13&#xD7;13</option>
  <option value="19">19&#xD7;19</option>
 </select>
 <label>Доска</label>
 <select id="boardStyle">
  <option value="wood" selected>Дерево</option>
  <option value="dark">Тёмная</option>
  <option value="bamboo">Бамбук</option>
 </select>
 <label>Камни</label>
 <select id="stoneStyle">
  <option value="glass" selected>Стеклянные</option>
  <option value="flat">Плоские</option>
 </select>
 <label>Подписи</label>
 <select id="coordStyle">
  <option value="1" selected>Да</option>
  <option value="0">Нет</option>
 </select>
 <label>Режим</label>
 <div class="tabs" id="modeTabs">
  <button class="active" data-mode="ai" onclick="switchGoMode('ai')">&#x1F916; Игра с ИИ</button>
  <button data-mode="practice" onclick="switchGoMode('practice')">&#x1F3AF; Практика</button>
 </div>
 <div id="aiSettings">
  <label>Сложность ИИ</label>
  <select id="levelSel">
   <option value="1">Новичок</option>
   <option value="2" selected>Опытный</option>
   <option value="3">Профессионал</option>
  </select>
 </div>
 <br>
 <button class="btn-big btn-green" onclick="startGame()">&#x1F3AE; Играть</button>
</div>

<div id="game">
 <div id="info"></div>
 <div id="practiceBar">
  <span style="font-size:13px;color:#aaa">Цвет:</span>
  <button id="pbBlack" class="btn-sm btn-active" onclick="setPracticeColor(1)">&#x26AB;</button>
  <button id="pbWhite" class="btn-sm" onclick="setPracticeColor(-1)">&#x26AA;</button>
  <button class="btn-sm" onclick="act('clear')" style="background:#5a3030">&#x1F5D1;</button>
 </div>
 <div id="boardBox"></div>
 <div id="btns">
  <button id="btnPass" onclick="act('pass')">&#x23ED; Пас</button>
  <button onclick="act('undo')">&#x21A9; Отмена</button>
  <button class="btn-red" onclick="act('end')">&#x1F3C1; Конец</button>
 </div>
 <div id="result" style="display:none;margin:16px">
  <h2 id="resultTitle" style="font-size:22px;margin-bottom:8px"></h2>
  <div id="resultScore" style="font-size:16px;color:#aaa;margin-bottom:16px"></div>
  <button class="btn-big btn-green" onclick="act('closeGame')">&#x1F3AE; В меню</button>
 </div>
</div>

<script>
var tg=window.Telegram?Telegram.WebApp:null;
if(tg){try{tg.ready()}catch(e){}try{tg.expand()}catch(e){}try{tg.MainButton.hide()}catch(e){}}

var B=1,W=-1,E=0;
var game=null,board=null,size=9,aiLevel=2,mode='ai',practiceColor=B;
var hist=[],passed=false,undoUsed=false,gameActive=false;
var stoneObjects=[],aiTimer=0;

function showScreen(id){
 document.getElementById('menu-main').style.display='none';
 document.getElementById('menu-go').style.display='none';
 document.getElementById('game').style.display='none';
 document.getElementById(id).style.display=(id==='game'?'flex':'block');
}

function openGoSettings(){showScreen('menu-go')}

function switchGoMode(m){
 mode=m;
 document.getElementById('aiSettings').style.display=(m==='ai'?'block':'none');
 var tabs=document.getElementById('modeTabs').children;
 for(var i=0;i<tabs.length;i++)tabs[i].classList.toggle('active',tabs[i].dataset.mode===m);
}

function setPracticeColor(c){
 practiceColor=c;
 document.getElementById('pbBlack').classList.toggle('btn-active',c===B);
 document.getElementById('pbWhite').classList.toggle('btn-active',c===W);
}

function initGame(sz,level){
 size=sz;aiLevel=level;
 game=new WGo.Game(size,WGo.JAPANESE_RULES);
 practiceColor=B;
 document.getElementById('pbBlack').classList.add('btn-active');
 document.getElementById('pbWhite').classList.remove('btn-active');
 hist=[];passed=false;undoUsed=false;stoneObjects=[];
}

function refreshBoard(){
 var pos=game.position;
 var newStones=[];
 for(var x=0;x<size;x++)for(var y=0;y<size;y++){
  var c=pos.get(x,y);
  if(c===E)continue;
  var ex=stoneObjects.find(function(o){return o.x===x&&o.y===y&&o.color===c;});
  if(ex){newStones.push(ex);continue}
  var obj=new WGo.FieldBoardObject(c===B?'B':'W',x,y);
  board.addObject(obj);
  obj.color=c;
  newStones.push(obj);
 }
 for(var i=0;i<stoneObjects.length;i++){
  if(newStones.indexOf(stoneObjects[i])<0)board.removeObject(stoneObjects[i]);
 }
 stoneObjects=newStones;
}

function startGame(){
 var sz=parseInt(document.getElementById('sizeSel').value);
 var lv=parseInt(document.getElementById('levelSel').value);
 var bs=document.getElementById('boardStyle').value;
 var ss=document.getElementById('stoneStyle').value;
 var co=document.getElementById('coordStyle').value==='1';
 initGame(sz,lv);

 var box=document.getElementById('boardBox');
 var parent=box.parentNode;
 var newBox=document.createElement('div');
 newBox.id='boardBox';
 newBox.style.display='inline-block';
 parent.replaceChild(newBox,box);
 box=newBox;
 var maxW=Math.min(window.innerWidth*0.92,window.innerHeight*0.6,600);

 var styles={
  wood:{bg:'#CEB053',line:'#654525',star:'#531',coord:'#531'},
  dark:{bg:'#6B4E1F',line:'#3D2B0F',star:'#2A1A08',coord:'#A08060'},
  bamboo:{bg:'#D4C878',line:'#8B7D4A',star:'#5C4A20',coord:'#5C4A20'}
 }[bs];

 var theme={
  backgroundColor:styles.bg,
  grid:{linesColor:styles.line,starColor:styles.star},
  coordinates:{color:styles.coord,top:co,right:co,bottom:co,left:co}
 };
 if(ss==='flat')theme.drawHandlers={B:new WGo.SVGStoneDrawHandler(),W:new WGo.SVGStoneDrawHandler()};

 board=new WGo.SVGBoard(box,{size:size,width:maxW,theme:theme,coordinates:co});

 board.on('click',function(evt,point){
  if(!point)return;
  if(mode==='practice'){
   var cur=game.position.get(point.x,point.y);
   game.setStone(point.x,point.y,cur===E?practiceColor:E);
   refreshBoard();updateInfo();
   return;
  }
  if(!gameActive||(mode==='ai'&&game.turn!==B))return;
  if(!game.play(point.x,point.y))return;
  hist.push({x:point.x,y:point.y,color:B});
  passed=false;undoUsed=false;
 refreshBoard();updateInfo();
 if(mode==='ai')aiTimer=setTimeout(aiMove,200);
 });

 showScreen('game');
 gameActive=true;
 clearTimeout(aiTimer);
 document.getElementById('result').style.display='none';
 document.getElementById('boardBox').style.display='';
 document.getElementById('btns').style.display='';
 document.getElementById('info').style.display='';
 document.getElementById('practiceBar').style.display=(mode==='practice'?'flex':'none');
 document.getElementById('btnPass').style.display=(mode==='practice'?'none':'inline');
 updateInfo();
}

function countStones(pos,color){
 var cnt=0;
 for(var i=0;i<pos.grid.length;i++)if(pos.grid[i]===color)cnt++;
 return cnt;
}

function aiEvaluate(x,y){
 var result=game.tryToPlay(x,y);
 if(!result)return-1;
 var curBl=countStones(game.position,B);
 var newBl=countStones(result,B);
 var captured=curBl-newBl;
 var sc=captured*10;
 if(aiLevel===3){
  var cx=(size-1)/2,cy=(size-1)/2;
  var dist=Math.abs(x-cx)+Math.abs(y-cy);
  sc+=Math.max(0,8-dist)*0.5;
  if(x===0||x===size-1||y===0||y===size-1)sc-=2;
 }
 return sc;
}

function aiMove(){
 if(!gameActive||mode!=='ai'||game.turn!==W)return;
 var all=[];
 for(var x=0;x<size;x++)for(var y=0;y<size;y++){
  if(game.position.get(x,y)!==E)continue;
  var sc=aiEvaluate(x,y);
  if(sc<0)continue;
  all.push({x:x,y:y,s:sc});
 }
 if(aiLevel===1){
  if(all.length&&Math.random()<0.4){
   var rm=all[Math.floor(Math.random()*all.length)];
   game.play(rm.x,rm.y);hist.push({x:rm.x,y:rm.y,color:W});
   passed=false;undoUsed=false;
   refreshBoard();updateInfo();return;
  }
 }
 if(!all.length){act('pass');return}
 all.sort(function(a,b){return b.s-a.s});
 var best=[];
 for(var i=0;i<all.length;i++)if(all[i].s===all[0].s)best.push(all[i]);else break;
 var m=best[Math.floor(Math.random()*best.length)];
 game.play(m.x,m.y);hist.push({x:m.x,y:m.y,color:W});
 passed=false;undoUsed=false;
 refreshBoard();updateInfo();
}

function flod(r,c){
 var cells=[],stk=[[r,c]],borders={};
 while(stk.length){
  var p=stk.pop(),kr=p[0]+','+p[1];
  if(cells.indexOf(kr)>=0)continue;cells.push(kr);
  var nb=[[p[0]-1,p[1]],[p[0]+1,p[1]],[p[0],p[1]-1],[p[0],p[1]+1]];
  for(var i=0;i<nb.length;i++){
   var nr=nb[i][0],nc=nb[i][1];
   if(nr<0||nr>=size||nc<0||nc>=size)continue;
   var v=game.position.get(nr,nc);
   if(v===E&&cells.indexOf(nr+','+nc)<0)stk.push([nr,nc]);
   else if(v)borders[v]=true;
  }
 }
 return{cells:cells,borders:Object.keys(borders).length===1?parseInt(Object.keys(borders)[0]):null};
}

function calcScore(){
 var pos=game.position,s={};s[B]=0;s[W]=0;
 var vis={};
 for(var x=0;x<size;x++)for(var y=0;y<size;y++){
  var v=pos.get(x,y),k=x+','+y;
  if(v!==E)s[v]++;
  else if(!vis[k]){
   var reg=flod(x,y);vis[k]=true;
   for(var i=0;i<reg.cells.length;i++)vis[reg.cells[i]]=true;
   if(reg.borders===B)s[B]+=reg.cells.length;
   else if(reg.borders===W)s[W]+=reg.cells.length;
  }
 }
 return s;
}

function updateInfo(){
 var sc=calcScore();
 var bscore=sc[B];
 var wscore=sc[W]+6.5;
 document.getElementById('info').textContent='\u26AB '+bscore.toFixed(1)+' : '+wscore.toFixed(1)+' \u26AA (коми 6.5) \u0425\u043e\u0434 '+(hist.length+1);
}

function act(a){
 if(a==='pass'){
  if(passed&&!undoUsed){endGame();return}
  game.pass();passed=true;undoUsed=false;
  hist.push(null);
 }else if(a==='undo'){
  if(!hist.length)return;
  hist.pop();game.popPosition();
  passed=false;undoUsed=true;
  refreshBoard();
 }else if(a==='clear'){
  initGame(size,aiLevel);
  refreshBoard();updateInfo();
 }else if(a==='end'){endGame();return}
  else if(a==='closeGame'){
   var s=calcScore(),w=s[B]>s[W]?'\u26AB \u0427\u0451\u0440\u043d\u044b\u0435':'\u26AA \u0411\u0435\u043b\u044b\u0435';
   if(tg)tg.sendData(JSON.stringify({score:{black:s[B],white:s[W]},winner:w,size:size,moves:hist.filter(Boolean).length}));
   board=null;game=null;stoneObjects=[];
   document.getElementById('result').style.display='none';
   document.getElementById('boardBox').style.display='';
   document.getElementById('btns').style.display='';
   document.getElementById('info').style.display='';
  showScreen('menu-go');
  return;
 }
 updateInfo();
 if(mode==='ai'&&gameActive)aiTimer=setTimeout(aiMove,200);
}

function endGame(){
 gameActive=false;clearTimeout(aiTimer);
 var s=calcScore(),w=s[B]>s[W]?'\u26AB \u0427\u0451\u0440\u043d\u044b\u0435':'\u26AA \u0411\u0435\u043b\u044b\u0435';
 document.getElementById('boardBox').style.display='none';
 document.getElementById('btns').style.display='none';
 document.getElementById('info').style.display='none';
 document.getElementById('practiceBar').style.display='none';
 document.getElementById('resultTitle').textContent='\uD83C\uDFC1 '+w+' \u043f\u043e\u0431\u0435\u0434\u0438\u043b\u0438!';
 document.getElementById('resultScore').textContent='\u26AB '+s[B].toFixed(1)+' : '+(s[W]+6.5).toFixed(1)+' \u26AA (\u043a\u043e\u043c\u0438 6.5)';
 document.getElementById('result').style.display='block';
}
</script></body></html>
